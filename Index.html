<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="내 캘린더">
<meta name="theme-color" content="#03C75A">
<title>내 캘린더</title>
<script>
const manifestData={name:"내 캘린더",short_name:"캘린더",start_url:".",display:"standalone",background_color:"#ffffff",theme_color:"#03C75A",
  icons:[{src:"data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%2303C75A'/><text y='.9em' font-size='80' x='10'>📅</text></svg>",sizes:"192x192",type:"image/svg+xml"}]};
const blob=new Blob([JSON.stringify(manifestData)],{type:"application/json"});
document.write(`<link rel="manifest" href="${URL.createObjectURL(blob)}">`);
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --green:#03C75A;--green2:#029A45;--red:#FF4B4B;--blue:#3B82F6;
  --bg:#F4F5F8;--bg2:#fff;--bg3:#F9FAFB;--border:#E8EAED;
  --text:#1A1D23;--text2:#555;--text3:#aaa;
  --cell:#fff;--cell-out:#FAFAFA;--hover:#F0FFF8;--modal:#fff;
}
body.dark{
  --bg:#111827;--bg2:#1F2937;--bg3:#374151;--border:#374151;
  --text:#F9FAFB;--text2:#9CA3AF;--text3:#6B7280;
  --cell:#1F2937;--cell-out:#161e2a;--hover:#1a2e20;--modal:#253341;
}
html,body{height:100%;overflow:hidden;font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);}
button,input,textarea{font-family:inherit;}
button{cursor:pointer;}

/* ── 전체 레이아웃 ── */
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden;}

/* ── 헤더 ── */
#hdr{
  background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 12px;height:52px;gap:6px;flex-shrink:0;
  position:relative;z-index:10;
}
#hdr .menu-ic{font-size:20px;background:none;border:none;color:var(--text2);}
#title-btn{font-size:16px;font-weight:700;background:none;border:none;color:var(--text);flex:1;text-align:left;padding:0 4px;}
.hdr-icon-btn{background:none;border:none;font-size:20px;padding:4px;color:var(--text2);position:relative;}
.badge{position:absolute;top:2px;right:2px;width:7px;height:7px;border-radius:50%;background:var(--red);}

/* ── 빠른 툴바 (헤더 아래) ── */
#quick-bar{
  background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:5px 10px;gap:6px;flex-shrink:0;overflow-x:auto;
}
#quick-bar::-webkit-scrollbar{display:none;}
.qbtn{
  display:flex;flex-direction:column;align-items:center;gap:1px;
  background:none;border:1px solid var(--border);border-radius:10px;
  padding:5px 10px;font-size:9px;color:var(--text2);white-space:nowrap;flex-shrink:0;
  transition:all .15s;
}
.qbtn .qi{font-size:16px;line-height:1;}
.qbtn.on{border-color:var(--green);background:#E5FFF2;color:var(--green);}
.qbtn.today-btn{border-color:var(--green);color:var(--green);}
.view-seg{display:flex;border:1px solid var(--border);border-radius:10px;overflow:hidden;flex-shrink:0;}
.vseg{background:var(--bg2);border:none;padding:5px 10px;font-size:11px;color:var(--text2);}
.vseg.on{background:var(--green);color:#fff;font-weight:700;}

/* ── 달력 본문 (스와이프 영역) ── */
#cal-wrap{flex:1;overflow:hidden;position:relative;touch-action:pan-y;}
#cal-body{width:100%;height:100%;overflow:auto;display:flex;flex-direction:column;}

/* ── 사이드바 (슬라이드 오버레이) ── */
#sidebar{
  position:fixed;left:0;top:0;bottom:0;width:260px;z-index:200;
  background:var(--bg2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
  transform:translateX(-100%);transition:transform .25s ease;
  box-shadow:4px 0 24px rgba(0,0,0,.18);
}
#sidebar.open{transform:translateX(0);}
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:190;}
#overlay.show{display:block;}
.sb-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 14px 8px;}
.sb-title{font-size:15px;font-weight:700;color:var(--text);}
.sb-close{background:none;border:none;font-size:20px;color:var(--text3);}

/* 미니 달력 */
.mini-nav{display:flex;justify-content:space-between;align-items:center;padding:0 12px 4px;}
.mini-nav button{background:none;border:none;color:var(--text3);font-size:15px;padding:2px 6px;}
.mini-nav span{font-size:12px;font-weight:700;color:var(--text);}
.mini-grid{display:grid;grid-template-columns:repeat(7,1fr);padding:0 10px;gap:1px 0;}
.mc{font-size:10px;text-align:center;padding:3px 1px;border-radius:50%;cursor:pointer;}
.mc.td{background:var(--green)!important;color:#fff!important;font-weight:700;}
.mc.sl{background:#E5FFF2;color:var(--green);font-weight:700;}
.mc.out{color:var(--text3);}
.mc.su{color:var(--red);}
.mc.sa{color:var(--blue);}

/* 사이드바 섹션 */
.sb-sec{padding:8px 12px;border-top:1px solid var(--border);}
.sb-sec-title{font-size:10px;font-weight:700;color:var(--text3);margin-bottom:6px;letter-spacing:.5px;}
.cat-dots{display:flex;flex-wrap:wrap;gap:3px 10px;}
.cat-dot{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text2);}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.up-item{display:flex;gap:7px;padding:5px 0;cursor:pointer;border-bottom:1px solid var(--border);align-items:flex-start;}
.up-name{font-size:11px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.up-sub{font-size:9px;color:var(--text3);}
.upcoming{flex:1;overflow:auto;padding:0 12px;}

/* ── 월간 뷰 ── */
.day-hdrs{display:grid;grid-template-columns:repeat(7,1fr);background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;}
.dh{text-align:center;padding:6px 0;font-size:11px;font-weight:600;color:var(--text3);}
.dh.su{color:var(--red);}.dh.sa{color:var(--blue);}
.month-rows{display:grid;grid-template-rows:repeat(6,1fr);flex:1;}
.mrow{display:grid;grid-template-columns:repeat(7,1fr);}
.cell{border-right:1px solid var(--border);border-bottom:1px solid var(--border);min-height:76px;padding:2px 3px;background:var(--cell);overflow:hidden;cursor:pointer;transition:background .1s;}
.cell.out{background:var(--cell-out);}
.cell.tdc{background:var(--hover);}
.cell-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:1px;}
.dn{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;font-size:11px;}
.dn.tdn{background:var(--green);color:#fff;font-weight:700;}
.dn.hol{color:var(--red);}
.dn.ou{color:var(--text3);}
.dn.su{color:var(--red);}.dn.sa{color:var(--blue);}
.cell-meta{display:flex;gap:2px;align-items:center;}
.lun{font-size:7px;color:var(--text3);}
.hol-name{font-size:8px;color:var(--red);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:1px;}
.ep{font-size:10px;border-radius:3px;padding:1px 5px;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;color:#fff;cursor:pointer;}
.more{font-size:8px;color:var(--text3);margin-top:1px;}

/* ── 주간/일간 ── */
.whdr{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;}
.tg{width:40px;flex-shrink:0;}
.wdc{flex:1;text-align:center;padding:5px 0 3px;border-left:1px solid var(--border);}
.wdc.tdc2{background:var(--hover);}
.wdn{font-size:9px;margin-bottom:1px;}
.wdnum{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;font-size:12px;font-weight:700;}
.wdnum.tdn{background:var(--green);color:#fff;}
.wdlun{font-size:7px;color:var(--text3);}
.allday-row{display:flex;background:var(--bg3);border-bottom:1px solid var(--border);min-height:22px;flex-shrink:0;}
.al{width:40px;flex-shrink:0;font-size:8px;color:var(--text3);display:flex;align-items:center;justify-content:flex-end;padding-right:3px;}
.adc{flex:1;border-left:1px solid var(--border);padding:2px;}
.tscroll{flex:1;overflow:auto;display:flex;}
.tc{width:40px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);}
.tl{height:52px;display:flex;align-items:flex-end;justify-content:flex-end;padding-right:3px;padding-bottom:2px;font-size:9px;color:var(--text3);}
.wec{flex:1;border-left:1px solid var(--border);position:relative;cursor:pointer;}
.hl{height:52px;border-bottom:1px solid var(--border);}
.tev{position:absolute;left:2px;right:2px;color:#fff;border-radius:4px;padding:1px 4px;font-size:9px;font-weight:600;cursor:pointer;z-index:2;min-height:18px;overflow:hidden;}
.dhbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:8px 14px;display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap;}
.dev{position:absolute;left:8px;right:8px;color:#fff;border-radius:7px;padding:4px 9px;font-size:12px;font-weight:600;cursor:pointer;z-index:2;box-shadow:0 2px 8px rgba(0,0,0,.12);}

/* ── 패널 (검색/할일/트래커) ── */
#panel-overlay{display:none;position:fixed;inset:0;z-index:110;background:rgba(0,0,0,.3);}
#panel-overlay.show{display:block;}
#panel-box{
  position:fixed;bottom:0;left:0;right:0;z-index:120;
  background:var(--bg2);border-radius:20px 20px 0 0;
  box-shadow:0 -4px 24px rgba(0,0,0,.15);
  max-height:70vh;display:flex;flex-direction:column;
  transform:translateY(100%);transition:transform .25s ease;
}
#panel-box.show{transform:translateY(0);}
.panel-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:10px auto 6px;}
.panel-hdr{display:flex;align-items:center;justify-content:space-between;padding:0 16px 10px;}
.panel-title{font-size:14px;font-weight:700;color:var(--text);}
.panel-close{background:none;border:none;font-size:18px;color:var(--text3);}
.panel-body{flex:1;overflow:auto;padding:0 16px 20px;}

/* 검색 */
.sinp{border:1.5px solid var(--border);border-radius:10px;padding:9px 12px;font-size:13px;outline:none;width:100%;background:var(--bg2);color:var(--text);margin-bottom:8px;}
.sres-item{display:flex;gap:8px;padding:7px 0;cursor:pointer;border-bottom:1px solid var(--border);align-items:center;}

/* 할일 */
.todo-item{display:flex;align-items:center;gap:6px;padding:6px 0;border-bottom:1px solid var(--border);}
.todo-item span{font-size:12px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tdel{background:none;border:none;font-size:14px;color:var(--text3);}
.tadd{border:1.5px solid var(--border);border-radius:10px;padding:8px 12px;font-size:12px;outline:none;width:100%;margin-top:8px;background:var(--bg2);color:var(--text);}

/* 트래커 */
.tr-row{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
.tr-day{font-size:10px;color:var(--text3);width:18px;}
.tr-bg{flex:1;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;}
.tr-bar{height:100%;background:var(--blue);border-radius:3px;}
.tr-mins{font-size:10px;color:var(--text3);width:30px;text-align:right;}
.tr-total{font-size:11px;color:var(--green);font-weight:700;margin-top:6px;}

/* ── 더보기 메뉴 ── */
#more-menu{
  display:none;position:fixed;top:56px;right:8px;z-index:300;
  background:var(--modal);border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,.2);
  min-width:160px;overflow:hidden;border:1px solid var(--border);
}
#more-menu.show{display:block;}
.mmi{display:flex;align-items:center;gap:10px;padding:12px 16px;font-size:13px;color:var(--text);cursor:pointer;border-bottom:1px solid var(--border);}
.mmi:last-child{border:none;}
.mmi:hover{background:var(--bg3);}
.mmi .mi{font-size:16px;}

/* ── 일정 모달 ── */
#modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:250;display:none;align-items:center;justify-content:center;padding:12px;}
.modal{background:var(--modal);border-radius:16px;width:100%;max-width:390px;max-height:92vh;overflow:auto;box-shadow:0 24px 64px rgba(0,0,0,.25);}
.mhdr{padding:15px 17px 0;display:flex;justify-content:space-between;align-items:flex-start;}
.mtitle{font-size:15px;font-weight:700;color:var(--text);}
.msub{font-size:10px;color:var(--text3);margin-top:2px;}
.mclose{background:none;border:none;font-size:18px;color:var(--text3);}
.mbody{padding:11px 17px 17px;display:flex;flex-direction:column;gap:10px;}
.flabel{font-size:10px;font-weight:700;color:var(--text3);margin-bottom:4px;}
.finp{border:1.5px solid var(--border);border-radius:9px;padding:9px 11px;font-size:13px;outline:none;width:100%;background:var(--bg2);color:var(--text);}
.chips{display:flex;gap:4px;flex-wrap:wrap;}
.chip{border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-size:11px;background:var(--bg2);color:var(--text2);}
.chip.on{border:none;color:#fff;font-weight:700;}
.crow{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.dinp{border:1.5px solid var(--border);border-radius:7px;padding:4px 6px;font-size:11px;width:55px;background:var(--bg2);color:var(--text);outline:none;}
.fmemo{border:1.5px solid var(--border);border-radius:9px;padding:7px 10px;font-size:12px;outline:none;width:100%;resize:vertical;background:var(--bg2);color:var(--text);line-height:1.6;}
.btn-row{display:flex;gap:5px;margin-top:2px;}
.bdel{flex:1;border:1.5px solid #FFE5E5;background:#FFF5F5;color:#FF4B4B;border-radius:8px;padding:8px 0;font-size:12px;font-weight:600;}
.bcopy{flex:1;border:1.5px solid var(--border);background:var(--bg2);color:var(--text2);border-radius:8px;padding:8px 0;font-size:12px;font-weight:600;}
.bcancel{flex:1;border:1.5px solid var(--border);background:var(--bg2);color:var(--text2);border-radius:8px;padding:8px 0;font-size:12px;font-weight:600;}
.bsave{flex:2;border:none;background:linear-gradient(135deg,var(--green),var(--green2));color:#fff;border-radius:8px;padding:8px 0;font-size:13px;font-weight:700;}

/* ── 토스트 ── */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);border-radius:9px;padding:9px 18px;font-size:13px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.2);z-index:400;white-space:nowrap;display:none;color:#fff;}

/* ── 설치 배너 ── */
#install-banner{position:fixed;bottom:0;left:0;right:0;background:var(--green);color:#fff;padding:12px 16px;display:none;align-items:center;gap:10px;z-index:300;}
#install-banner span{flex:1;font-size:13px;font-weight:600;}
#install-banner .ib{background:#fff;color:var(--green);border:none;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:700;}
#install-banner .ibc{background:none;color:#fff;border:none;padding:4px;font-size:16px;}

/* 스와이프 애니메이션 */
@keyframes slideInLeft{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideInRight{from{opacity:0;transform:translateX(-40px)}to{opacity:1;transform:translateX(0)}}
.anim-left{animation:slideInLeft .18s ease;}
.anim-right{animation:slideInRight .18s ease;}
</style>
</head>
<body>
<div id="app">

  <!-- 헤더 -->
  <div id="hdr">
    <button class="menu-ic" onclick="toggleSidebar()">☰</button>
    <button id="title-btn" onclick="toggleSidebar()"></button>
    <button class="hdr-icon-btn" onclick="openPanel('search')" title="검색">🔍</button>
    <button class="hdr-icon-btn" id="notif-icon" onclick="requestNotif()" title="알림" style="display:none">🔔</button>
    <button class="hdr-icon-btn" onclick="toggleMoreMenu()" title="더보기">⋮</button>
  </div>

  <!-- 빠른 툴바 -->
  <div id="quick-bar">
    <button class="qbtn today-btn" onclick="goToday()"><span class="qi">📅</span>오늘</button>
    <div class="view-seg">
      <button class="vseg" id="vs-month" onclick="setView('month')">월</button>
      <button class="vseg" id="vs-week"  onclick="setView('week')">주</button>
      <button class="vseg" id="vs-day"   onclick="setView('day')">일</button>
    </div>
    <button class="qbtn" id="qb-todo"    onclick="openPanel('todo')"><span class="qi">✅</span>할일</button>
    <button class="qbtn" id="qb-tracker" onclick="openPanel('tracker')"><span class="qi">⏱️</span>트래커</button>
    <button class="qbtn" id="qb-dark"    onclick="toggleDark()"><span class="qi">🌙</span>다크</button>
    <button class="qbtn" onclick="openAdd()"><span class="qi">＋</span>추가</button>
  </div>

  <!-- 달력 본문 (스와이프 영역) -->
  <div id="cal-wrap">
    <div id="cal-body"></div>
  </div>
</div>

<!-- 사이드바 -->
<div id="sidebar">
  <div class="sb-hdr">
    <span class="sb-title">📅 내 캘린더</span>
    <button class="sb-close" onclick="closeSidebar()">×</button>
  </div>
  <!-- 미니 달력 -->
  <div class="mini-nav">
    <button onclick="navMini(-1)">‹</button>
    <span id="mini-title"></span>
    <button onclick="navMini(1)">›</button>
  </div>
  <div class="mini-grid" id="mini-grid"></div>
  <!-- 카테고리 -->
  <div class="sb-sec">
    <div class="sb-sec-title">카테고리</div>
    <div class="cat-dots" id="cat-dots"></div>
  </div>
  <!-- 다가오는 일정 -->
  <div class="sb-sec" style="flex:1;overflow:hidden;display:flex;flex-direction:column;padding-bottom:0;">
    <div class="sb-sec-title">다가오는 일정</div>
    <div class="upcoming" id="upcoming-list"></div>
  </div>
</div>
<div id="overlay" onclick="closeSidebar()"></div>

<!-- 더보기 메뉴 -->
<div id="more-menu">
  <div class="mmi" onclick="exportICS();toggleMoreMenu()"><span class="mi">📤</span>ICS 내보내기</div>
  <div class="mmi" onclick="document.getElementById('ics-file').click();toggleMoreMenu()"><span class="mi">📥</span>ICS 가져오기</div>
  <div class="mmi" onclick="showInstallHelp();toggleMoreMenu()"><span class="mi">📲</span>앱 설치 안내</div>
  <input type="file" id="ics-file" accept=".ics" style="display:none" onchange="importICS(event)">
</div>

<!-- 패널 (바텀 시트) -->
<div id="panel-overlay" onclick="closePanel()"></div>
<div id="panel-box">
  <div class="panel-handle"></div>
  <div class="panel-hdr">
    <span class="panel-title" id="panel-title"></span>
    <button class="panel-close" onclick="closePanel()">×</button>
  </div>
  <div class="panel-body" id="panel-body"></div>
</div>

<!-- 일정 모달 -->
<div id="modal-bg" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="mhdr">
      <div><div class="mtitle" id="modal-title">새 일정</div><div class="msub" id="modal-sub"></div></div>
      <button class="mclose" onclick="closeModal()">×</button>
    </div>
    <div class="mbody">
      <input class="finp" id="f-title" placeholder="일정 제목" onkeydown="if(event.key==='Enter')saveEvent()">
      <div><div class="flabel">🏷️ 카테고리</div><div class="chips" id="cat-chips"></div></div>
      <div class="crow">
        <label style="display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2);cursor:pointer;">
          <input type="checkbox" id="f-allday" checked onchange="toggleAllDay()" style="accent-color:var(--green)">종일
        </label>
        <input type="time" id="f-time" class="finp" style="width:auto;padding:5px 8px;font-size:12px;display:none" value="09:00">
        <div id="dur-row" style="display:none;align-items:center;gap:4px;font-size:11px;color:var(--text2);">

function solarToLunar(y,m,d){
  const a=Math.floor((14-m)/12),yy=y+4800-a,mm=m+12*a-3;
  let jdn=d+Math.floor((153*mm+2)/5)+365*yy+Math.floor(yy/4)-Math.floor(yy/100)+Math.floor(yy/400)-32045;
  const k=Math.floor((jdn-2415021.076998695)/29.53058135+0.5);
  let jm=2415021.076998695+29.53058135*k;
  const T=(jm-2451545)/36525,Mp=(134.9634+477198.8676*T+0.008997*T*T)*(Math.PI/180);
  jm+=0.1117*Math.sin(Mp)+0.0017*Math.sin(2*Mp);
  let ld=Math.round(jdn-Math.floor(jm)+1);
  const lm=((k%12)+12)%12+1;
  if(ld<1)ld+=29;else if(ld>30)ld-=29;
  return{month:lm,day:ld};
}
function lunarStr(date){
  try{const l=solarToLunar(date.getFullYear(),date.getMonth()+1,date.getDate());return`음 ${l.month}/${l.day}`;}catch{return"";}
}

function getHolidays(y){
  const h={},add=(m,d,n)=>{h[`${y}-${p(m)}-${p(d)}`]=n;};
  add(1,1,"신정");add(3,1,"삼일절");add(5,5,"어린이날");add(6,6,"현충일");
  add(8,15,"광복절");add(10,3,"개천절");add(10,9,"한글날");add(12,25,"크리스마스");
  const sl={2024:[2,10],2025:[1,29],2026:[2,17],2027:[2,6]};
  if(sl[y]){const[sm,sd]=sl[y];const pv=new Date(y,sm-1,sd-1),nx=new Date(y,sm-1,sd+1);
    add(pv.getMonth()+1,pv.getDate(),"설날 전날");add(sm,sd,"설날");add(nx.getMonth()+1,nx.getDate(),"설날 다음날");}
  const cs={2024:[9,17],2025:[10,6],2026:[9,25],2027:[10,15]};
  if(cs[y]){const[cm,cd]=cs[y];const pv=new Date(y,cm-1,cd-1),nx=new Date(y,cm-1,cd+1);
    add(pv.getMonth()+1,pv.getDate(),"추석 전날");add(cm,cd,"추석");add(nx.getMonth()+1,nx.getDate(),"추석 다음날");}
  const bd={2024:[5,15],2025:[5,5],2026:[5,24],2027:[5,13]};
  if(bd[y]){const[bm,bdd]=bd[y];add(bm,bdd,"부처님오신날");}
  const sub={
    2024:[[2,12,"대체공휴일(설날)"],[9,23,"대체공휴일(추석)"]],
    2025:[[3,3,"대체공휴일(삼일절)"],[5,6,"대체공휴일(부처님오신날)"],[10,6,"대체공휴일(개천절)"]],
    2026:[[3,2,"대체공휴일(삼일절)"],[5,25,"대체공휴일(부처님오신날)"],[8,17,"대체공휴일(광복절)"],[10,5,"대체공휴일(개천절)"]],
    2027:[[3,2,"대체공휴일(삼일절)"],[5,24,"대체공휴일(부처님오신날)"]],
  };
  if(sub[y])sub[y].forEach(([m,d,n])=>add(m,d,n));
  const elec={2026:[[6,3,"전국동시지방선거"]]};
  if(elec[y])elec[y].forEach(([m,d,n])=>add(m,d,n));
  if(y>=2026)add(7,17,"제헌절");
  return h;
}

// ══════════════════════════════════════════════════════
// 반복 전개
// ══════════════════════════════════════════════════════
function expandEv(ev,rs,re){
  const res=[],base=new Date(ev.date);
  if(!ev.repeat||ev.repeat==="none"){if(base>=rs&&base<=re)res.push({...ev,_v:false});return res;}
  let cur=new Date(base),s=0;
  while(cur<=re&&s++<3000){
    if(cur>=rs)res.push({...ev,date:new Date(cur),_v:!sameDay(cur,base),_bid:ev.id});
    if(ev.repeat==="daily")cur.setDate(cur.getDate()+1);
    else if(ev.repeat==="weekly")cur.setDate(cur.getDate()+7);
    else if(ev.repeat==="monthly")cur.setMonth(cur.getMonth()+1);
    else cur.setFullYear(cur.getFullYear()+1);
  }
  return res;
}
function evsFor(date){
  const rs=new Date(date);rs.setHours(0,0,0,0);
  const re=new Date(date);re.setHours(23,59,59,999);
  return window._ev.flatMap(ev=>expandEv(ev,rs,re)).filter(e=>sameDay(e.date,date))
    .sort((a,b)=>{if(a.allDay&&!b.allDay)return-1;if(!a.allDay&&b.allDay)return 1;return(a.time||"").localeCompare(b.time||"");});
}

function scheduleNotif(ev){
  if(!ev.alarm||ev.alarm==="none"||ev.allDay)return;
  if(!("Notification"in window)||Notification.permission!=="granted")return;
  const[hh,mm]=(ev.time||"09:00").split(":").map(Number);
  const d=new Date(ev.date);d.setHours(hh,mm,0,0);
  const delay=d.getTime()-parseInt(ev.alarm)*60000-Date.now();
  if(delay<0)return;
  setTimeout(()=>new Notification(`📅 ${ev.title}`,{body:ev.alarm==="0"?"지금 일정!":` ${ev.alarm}분 후 일정`}),delay);
}
async function requestNotif(){
  if(!("Notification"in window))return showToast("알림 미지원","err");
  const pp=await Notification.requestPermission();ST.notifPerm=pp;
  document.getElementById("notif-icon").style.display=pp==="granted"?"none":"flex";
  showToast(pp==="granted"?"✅ 알림 허용됨!":"알림 거부됨",pp==="granted"?"ok":"err");
}

// ══════════════════════════════════════════════════════
// 스와이프 제스처 (달력 영역)
// ══════════════════════════════════════════════════════
function initSwipe(){
  const wrap=document.getElementById("cal-wrap");
  wrap.addEventListener("touchstart",e=>{
    swipeStartX=e.touches[0].clientX;
    swipeStartY=e.touches[0].clientY;
  },{passive:true});
  wrap.addEventListener("touchend",e=>{
    const dx=e.changedTouches[0].clientX-swipeStartX;
    const dy=e.changedTouches[0].clientY-swipeStartY;
    // 수직 스와이프가 주도적인 경우 (|dy|>|dx|*0.7)
    if(Math.abs(dy)>50&&Math.abs(dy)>Math.abs(dx)*0.7){
      if(dy<0){swipeAnim="left";nav(1);}   // 위로 → 다음 달
      else{swipeAnim="right";nav(-1);}     // 아래로 → 이전 달
    }
    // 수평 스와이프
    else if(Math.abs(dx)>60&&Math.abs(dx)>Math.abs(dy)*1.2){
      if(dx<0){swipeAnim="left";nav(1);}   // 왼쪽 → 다음
      else{swipeAnim="right";nav(-1);}     // 오른쪽 → 이전
    }
  },{passive:true});
}

}

function renderSearchPanel(body){
  body.innerHTML=`<input class="sinp" id="s-inp" placeholder="제목·메모 검색..." oninput="doSearch()">
    <div id="s-res"></div>`;

function doSearch(){
  const q=document.getElementById("s-inp")?.value.trim();
  const el=document.getElementById("s-res");if(!el)return;
  if(!q){el.innerHTML="";return;}
  const res=window._ev.filter(e=>e.title.includes(q)||(e.memo||"").includes(q)).sort((a,b)=>new Date(a.date)-new Date(b.date));
  if(!res.length){el.innerHTML=`<div style="font-size:12px;color:var(--text3);padding:8px 0">결과 없음</div>`;return;}
  el.innerHTML="";
  res.forEach(ev=>{

    div.innerHTML=`<div class="dot" style="background:${catColor(ev.catId)}"></div>

      <div style="font-size:10px;color:var(--text3)">${MONTHS[new Date(ev.date).getMonth()]} ${new Date(ev.date).getDate()}일 ${ev.allDay?"종일":ev.time||""}</div></div>`;
    div.onclick=()=>{closePanel();openEdit(ev.id);};el.appendChild(div);
  });
}

function renderTodoPanel(body){
  const list=document.createElement("div");
  window._td.forEach(t=>{
    const div=document.createElement("div");div.className="todo-item";
    div.innerHTML=`<input type="checkbox" ${t.done?"checked":""} style="accent-color:${catColor(t.catId)};cursor:pointer;width:16px;height:16px" onchange="toggleTodo('${t.id}')">
      <span style="text-decoration:${t.done?"line-through":"none"};opacity:${t.done?.5:1};color:var(--text)">${t.title}</span>
      <button class="tdel" onclick="deleteTodo('${t.id}')">×</button>`;
    list.appendChild(div);
  });
  body.appendChild(list);
  const inp=document.createElement("input");inp.className="tadd";inp.placeholder="새 할 일 입력 후 Enter";
  inp.onkeydown=e=>{if(e.key==="Enter"&&e.target.value.trim()){window._td=[...window._td,{id:genId(),title:e.target.value.trim(),done:false,catId:"personal"}];e.target.value="";save();renderPanelBody("todo");}};
  body.appendChild(inp);
}
function toggleTodo(id){window._td=window._td.map(t=>t.id===id?{...t,done:!t.done}:t);save();renderPanelBody("todo");}
function deleteTodo(id){window._td=window._td.filter(t=>t.id!==id);save();renderPanelBody("todo");}

function renderTrackerPanel(body){
  const wds=getWeekDays(ST.curDate);let total=0;
  wds.forEach(d=>{
    const mins=evsFor(d).filter(e=>!e.allDay&&!e.todo).reduce((s,e)=>s+(e.duration||60),0);total+=mins;
    const row=document.createElement("div");row.className="tr-row";
    row.innerHTML=`<span class="tr-day" style="color:${d.getDay()===0?"#FF4B4B":d.getDay()===6?"#3B82F6":"var(--text3)"}">${DAYS[d.getDay()]}</span>
      <div class="tr-bg"><div class="tr-bar" style="width:${Math.min(100,mins/4.8)}%"></div></div>
      <span class="tr-mins">${mins}분</span>`;
    body.appendChild(row);
  });
  body.innerHTML+=`<div class="tr-total">주간 합계: ${total}분 (${(total/60).toFixed(1)}h)</div>`;
}

function exportICS(){
  const fmt=d=>`${new Date(d).getFullYear()}${p(new Date(d).getMonth()+1)}${p(new Date(d).getDate())}`;
  const lines=["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//MyCalendar//KR"];
  window._ev.forEach(ev=>{
    lines.push("BEGIN:VEVENT",`UID:${ev.id}@mc`,`SUMMARY:${ev.title}`);
    if(ev.allDay){lines.push(`DTSTART;VALUE=DATE:${fmt(ev.date)}`,`DTEND;VALUE=DATE:${fmt(ev.date)}`);}
    else{const[hh,mm]=(ev.time||"09:00").split(":").map(Number);lines.push(`DTSTART:${fmt(ev.date)}T${p(hh)}${p(mm)}00`,`DTEND:${fmt(ev.date)}T${p(hh)}${p(mm)}00`);}
    if(ev.memo)lines.push(`DESCRIPTION:${ev.memo}`);lines.push("END:VEVENT");
  });
  lines.push("END:VCALENDAR");
  const a=document.createElement("a");a.href="data:text/calendar;charset=utf-8,"+encodeURIComponent(lines.join("\r\n"));a.download="calendar.ics";a.click();
  showToast("ICS 다운로드 완료! 📤");
}
function importICS(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();reader.onload=ev=>{
    const blocks=ev.target.result.split("BEGIN:VEVENT").slice(1);
    const imported=blocks.map(b=>{
      const get=k=>{const m=b.match(new RegExp(`${k}[^:]*:([^\r\n]+)`));return m?m[1].trim():"";};
      const title=get("SUMMARY"),dtstart=get("DTSTART");if(!title||!dtstart)return null;
      const allDay=dtstart.length===8,date=new Date(+dtstart.slice(0,4),+dtstart.slice(4,6)-1,+dtstart.slice(6,8));
      const time=allDay?undefined:`${dtstart.slice(9,11)}:${dtstart.slice(11,13)}`;
      return{id:genId(),title,date,allDay,time,catId:"personal",repeat:"none",alarm:"none",memo:get("DESCRIPTION"),todo:false,duration:60};
    }).filter(Boolean);
    window._ev=[...window._ev,...imported];save();showToast(`${imported.length}개 가져옴! 📥`);render();
  };reader.readAsText(file);e.target.value="";
}

function getMonthDays(cd){
  const y=cd.getFullYear(),m=cd.getMonth(),first=new Date(y,m,1).getDay(),dim=new Date(y,m+1,0).getDate(),dipm=new Date(y,m,0).getDate();
  const days=[];
  for(let i=first-1;i>=0;i--)days.push({date:new Date(y,m-1,dipm-i),out:true});
  for(let i=1;i<=dim;i++)days.push({date:new Date(y,m,i),out:false});
  while(days.length<42)days.push({date:new Date(y,m+1,days.length-first-dim+1),out:true});
  return days;
}
function getWeekDays(cd){
  const d=new Date(cd);d.setDate(d.getDate()-d.getDay());
  return Array.from({length:7},(_,i)=>{const n=new Date(d);n.setDate(n.getDate()+i);return n;});
}
function getMiniDays(){
  const cd=ST.miniDate,y=cd.getFullYear(),m=cd.getMonth(),first=new Date(y,m,1).getDay(),dim=new Date(y,m+1,0).getDate(),dipm=new Date(y,m,0).getDate();
  const days=[];
  for(let i=first-1;i>=0;i--)days.push({date:new Date(y,m-1,dipm-i),out:true});
  for(let i=1;i<=dim;i++)days.push({date:new Date(y,m,i),out:false});
  while(days.length<35)days.push({date:new Date(y,m+1,days.length-first-dim+1),out:true});
  return days;
}

function ensureHolidays(y){if(!holidays[y])holidays[y]=getHolidays(y);}

function renderMonth(body){
  const cd=ST.curDate;ensureHolidays(cd.getFullYear());const hols=holidays[cd.getFullYear()]||{};
  const hdrs=document.createElement("div");hdrs.className="day-hdrs";
  DAYS.forEach((d,i)=>{hdrs.innerHTML+=`<div class="dh ${i===0?"su":i===6?"sa":""}">${d}</div>`;});
  body.appendChild(hdrs);
  const rows=document.createElement("div");rows.className="month-rows";
  let row=null;
  getMonthDays(cd).forEach((dd,idx)=>{
    if(idx%7===0){row=document.createElement("div");row.className="mrow";rows.appendChild(row);}
    const{date,out}=dd,isT=sameDay(date,today),hol=hols[dKey(date)],wk=weatherData[dKey(date)],evs=evsFor(date),ds=dKey(date);
    const cell=document.createElement("div");
    cell.className=`cell${out?" out":""}${isT?" tdc":""}`;
    cell.ondragover=e=>e.preventDefault();cell.ondrop=e=>onDrop(e,ds);
    cell.onclick=()=>{ST.selDate=new Date(date);openAdd(ds);};
    const dow=date.getDay();
    let nc="dn";if(isT)nc+=" tdn";else if(hol)nc+=" hol";else if(out)nc+=" ou";else if(dow===0)nc+=" su";else if(dow===6)nc+=" sa";
    let html=`<div class="cell-top"><span class="${nc}">${date.getDate()}</span>
      <div class="cell-meta">${wk?`<span style="font-size:8px" title="${wk.temp}°C">${wk.icon}</span>`:""}
      <span class="lun">${lunarStr(date)}</span></div></div>`;

      html+=`<div class="ep" style="background:${catColor(ev.catId)}" draggable="true"

  navigator.serviceWorker.register(swURL).catch(()=>{});
}

// ══════════════════════════════════════════════════════
// 초기화
// ══════════════════════════════════════════════════════
loadData();
if(ST.dark)document.body.classList.add("dark");
if("Notification"in window){
  ST.notifPerm=Notification.permission;
  document.getElementById("notif-icon").style.display=ST.notifPerm==="granted"?"none":"flex";
}
ensureHolidays(today.getFullYear());
initSwipe();
loadWeather();
render();
</script>
