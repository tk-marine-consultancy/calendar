<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="내 캘린더">
<meta name="theme-color" content="#03C75A">
<title>내 캘린더</title>

<!-- PWA Manifest inline -->
<script>
const manifestData = {
  name: "내 캘린더",
  short_name: "캘린더",
  start_url: ".",
  display: "standalone",
  background_color: "#ffffff",
  theme_color: "#03C75A",
  icons: [
    { src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%2303C75A'/><text y='.9em' font-size='80' x='10'>📅</text></svg>", sizes: "192x192", type: "image/svg+xml" },
    { src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%2303C75A'/><text y='.9em' font-size='80' x='10'>📅</text></svg>", sizes: "512x512", type: "image/svg+xml" }
  ]
};
const blob = new Blob([JSON.stringify(manifestData)], {type:"application/json"});
const manifestURL = URL.createObjectURL(blob);
document.write(`<link rel="manifest" href="${manifestURL}">`);
</script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --green: #03C75A; --green2: #029A45;
    --red: #FF4B4B; --blue: #3B82F6; --sat: #3B82F6;
    --bg: #F4F5F8; --bg2: #fff; --bg3: #F9FAFB;
    --border: #E8EAED; --text: #1A1D23; --text2: #555; --text3: #aaa;
    --cell: #fff; --cell-out: #FAFAFA; --hover: #F0FFF8;
    --modal: #fff; --shadow: rgba(0,0,0,.18);
  }
  body.dark {
    --bg:#111827; --bg2:#1F2937; --bg3:#374151; --border:#374151;
    --text:#F9FAFB; --text2:#9CA3AF; --text3:#6B7280;
    --cell:#1F2937; --cell-out:#161e2a; --hover:#1a2e20; --modal:#1F2937;
  }
  html, body { height: 100%; overflow: hidden; font-family: 'Apple SD Gothic Neo','Noto Sans KR',sans-serif; background: var(--bg); color: var(--text); }
  button { font-family: inherit; cursor: pointer; }
  input, textarea { font-family: inherit; }

  /* ── Layout ── */
  #app { display: flex; height: 100vh; overflow: hidden; }
  #sidebar { width: 220px; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden; transition: transform .25s; }
  #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

  /* mobile: sidebar overlay */
  @media(max-width:700px){
    #sidebar { position: fixed; left:0; top:0; bottom:0; z-index:150; transform:translateX(-100%); width:240px; box-shadow:4px 0 20px rgba(0,0,0,.2); }
    #sidebar.open { transform:translateX(0); }
    #overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:140; }
    #overlay.show { display:block; }
  }

  /* ── Sidebar pieces ── */
  .add-btn { margin:12px 10px 8px; background:linear-gradient(135deg,var(--green),var(--green2)); color:#fff; border:none; border-radius:10px; padding:11px 0; font-size:14px; font-weight:700; letter-spacing:.3px; box-shadow:0 2px 10px rgba(3,199,90,.3); width:calc(100% - 20px); }
  .tool-grid { display:flex; gap:3px; padding:0 10px 8px; flex-wrap:wrap; }
  .tool-btn { flex:1 0 calc(33% - 3px); border:1px solid var(--border); border-radius:8px; padding:5px 2px; font-size:9px; background:var(--bg2); color:var(--text2); display:flex; flex-direction:column; align-items:center; gap:1px; transition:all .15s; min-width:0; }
  .tool-btn.active { border-color:var(--green); background:#E5FFF2; color:var(--green); }
  .tool-btn span.ic { font-size:14px; }
  .notif-bar { margin:0 10px 7px; background:#FFFBEB; border:1px solid #FCD34D; border-radius:8px; padding:6px 9px; font-size:10px; color:#92400E; cursor:pointer; }
  .panel { padding:0 10px 8px; border-bottom:1px solid var(--border); }
  .panel-title { font-size:10px; font-weight:700; color:var(--text3); margin-bottom:5px; }

  /* Mini cal */
  .mini-nav { display:flex; justify-content:space-between; align-items:center; padding:5px 10px 2px; }
  .mini-nav button { background:none; border:none; color:var(--text3); font-size:14px; padding:1px 5px; }
  .mini-nav span { font-size:11px; font-weight:700; color:var(--text); }
  .mini-grid { display:grid; grid-template-columns:repeat(7,1fr); padding:0 8px; gap:1px 0; }
  .mini-cell { font-size:10px; text-align:center; padding:2px 1px; border-radius:50%; cursor:pointer; font-weight:400; }
  .mini-cell.today { background:var(--green)!important; color:#fff!important; font-weight:700; }
  .mini-cell.sel { background:#E5FFF2!important; color:var(--green)!important; font-weight:700; }
  .mini-cell.out { color:var(--text3); }
  .mini-cell.sun { color:var(--red); }
  .mini-cell.sat { color:var(--sat); }

  /* View toggle */
  .view-btns { display:flex; gap:4px; padding:6px 10px; }
  .view-btn { flex:1; border:1px solid var(--border); border-radius:7px; padding:5px 0; font-size:11px; font-weight:400; background:var(--bg2); color:var(--text2); }
  .view-btn.active { border:none; background:var(--green); color:#fff; font-weight:700; }

  /* Cat legend */
  .cat-legend { padding:2px 10px 5px; }
  .cat-legend-title { font-size:9px; font-weight:700; color:var(--text3); margin-bottom:3px; }
  .cat-dots { display:flex; flex-wrap:wrap; gap:2px 8px; }
  .cat-dot { display:flex; align-items:center; gap:3px; font-size:10px; color:var(--text2); }
  .dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }

  /* Upcoming */
  .upcoming { padding:4px 10px 0; flex:1; overflow:auto; border-top:1px solid var(--border); }
  .upcoming-title { font-size:9px; font-weight:700; color:var(--text3); margin-bottom:5px; letter-spacing:.5px; }
  .up-item { display:flex; gap:6px; padding:5px 0; cursor:pointer; border-bottom:1px solid var(--border); align-items:flex-start; }
  .up-item .dot { margin-top:3px; }
  .up-name { font-size:11px; font-weight:600; color:var(--text); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .up-sub { font-size:9px; color:var(--text3); }

  /* ── Header ── */
  #header { background:var(--bg2); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 14px; height:50px; gap:6px; flex-shrink:0; }
  #header .menu-btn { background:none; border:none; font-size:20px; color:var(--text2); display:none; }
  @media(max-width:700px){ #header .menu-btn { display:block; } }
  .nav-btn { background:none; border:1px solid var(--border); border-radius:7px; padding:4px 10px; font-size:12px; color:var(--text2); }
  #title { font-size:15px; font-weight:700; margin:0 6px; }
  .today-btn { margin-left:auto; border:1px solid var(--green); border-radius:7px; padding:4px 12px; font-size:11px; font-weight:700; color:var(--green); background:none; }

  /* ── Calendar body ── */
  #cal-body { flex:1; overflow:auto; display:flex; flex-direction:column; }

  /* Month */
  .day-headers { display:grid; grid-template-columns:repeat(7,1fr); background:var(--bg2); border-bottom:1px solid var(--border); flex-shrink:0; }
  .day-hdr { text-align:center; padding:6px 0; font-size:11px; font-weight:600; color:var(--text3); }
  .day-hdr.sun { color:var(--red); } .day-hdr.sat { color:var(--sat); }
  .month-rows { display:grid; grid-template-rows:repeat(6,1fr); flex:1; }
  .month-row { display:grid; grid-template-columns:repeat(7,1fr); }
  .cell { border-right:1px solid var(--border); border-bottom:1px solid var(--border); min-height:78px; padding:2px 3px; background:var(--cell); cursor:pointer; overflow:hidden; position:relative; }
  .cell.out { background:var(--cell-out); }
  .cell.today-cell { background:var(--hover); }
  .cell-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:1px; }
  .date-num { display:inline-flex; align-items:center; justify-content:center; width:20px; height:20px; border-radius:50%; font-size:11px; font-weight:400; }
  .date-num.today-num { background:var(--green); color:#fff; font-weight:700; }
  .date-num.hol { color:var(--red); } .date-num.out-num { color:var(--text3); }
  .date-num.sun-num { color:var(--red); } .date-num.sat-num { color:var(--sat); }
  .cell-meta { display:flex; gap:2px; align-items:center; }
  .weather-ic { font-size:8px; }
  .lunar { font-size:7px; color:var(--text3); }
  .hol-name { font-size:8px; color:var(--red); margin-bottom:1px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .ev-pill { font-size:10px; border-radius:3px; padding:1px 5px; margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; cursor:pointer; display:block; color:#fff; }
  .more { font-size:8px; color:var(--text3); margin-top:1px; }

  /* Week */
  .week-hdr-row { display:flex; background:var(--bg2); border-bottom:1px solid var(--border); flex-shrink:0; }
  .time-gutter { width:42px; flex-shrink:0; }
  .week-day-col { flex:1; text-align:center; padding:5px 0 3px; border-left:1px solid var(--border); }
  .week-day-col.today-col { background:var(--hover); }
  .week-day-name { font-size:9px; margin-bottom:1px; }
  .week-day-num { display:inline-flex; align-items:center; justify-content:center; width:22px; height:22px; border-radius:50%; font-size:12px; font-weight:700; }
  .week-day-num.today-num { background:var(--green); color:#fff; }
  .week-day-lunar { font-size:7px; color:var(--text3); }
  .allday-row { display:flex; background:var(--bg3); border-bottom:1px solid var(--border); min-height:22px; flex-shrink:0; }
  .allday-label { width:42px; flex-shrink:0; font-size:8px; color:var(--text3); display:flex; align-items:center; justify-content:flex-end; padding-right:3px; }
  .allday-col { flex:1; border-left:1px solid var(--border); padding:2px; }
  .time-scroll { flex:1; overflow:auto; display:flex; }
  .time-col { width:42px; flex-shrink:0; background:var(--bg2); border-right:1px solid var(--border); }
  .time-label { height:52px; display:flex; align-items:flex-end; justify-content:flex-end; padding-right:3px; padding-bottom:2px; font-size:9px; color:var(--text3); }
  .week-ev-col { flex:1; border-left:1px solid var(--border); position:relative; cursor:pointer; }
  .hour-line { height:52px; border-bottom:1px solid; }
  .hour-line.dark-line { border-color:#2D3748; }
  .hour-line.light-line { border-color:#F5F5F5; }
  .timed-ev { position:absolute; left:2px; right:2px; color:#fff; border-radius:4px; padding:1px 4px; font-size:9px; font-weight:600; cursor:pointer; z-index:2; min-height:18px; overflow:hidden; }

  /* Day */
  .day-hdr-bar { background:var(--bg2); border-bottom:1px solid var(--border); padding:8px 14px; display:flex; align-items:center; gap:8px; flex-shrink:0; flex-wrap:wrap; }
  .day-ev-col { flex:1; position:relative; cursor:pointer; }
  .day-timed-ev { position:absolute; left:8px; right:8px; color:#fff; border-radius:7px; padding:4px 9px; font-size:12px; font-weight:600; cursor:pointer; z-index:2; min-height:24px; box-shadow:0 2px 8px rgba(0,0,0,.12); }

  /* ── Modal ── */
  .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:200; display:flex; align-items:center; justify-content:center; padding:12px; }
  .modal { background:var(--modal); border-radius:16px; width:100%; max-width:390px; max-height:92vh; overflow:auto; box-shadow:0 24px 64px var(--shadow); }
  .modal-hdr { padding:15px 17px 0; display:flex; justify-content:space-between; align-items:flex-start; }
  .modal-title { font-size:15px; font-weight:700; color:var(--text); }
  .modal-sub { font-size:10px; color:var(--text3); margin-top:2px; }
  .modal-close { background:none; border:none; font-size:18px; color:var(--text3); }
  .modal-body { padding:11px 17px 17px; display:flex; flex-direction:column; gap:10px; }
  .field-label { font-size:10px; font-weight:700; color:var(--text3); margin-bottom:4px; }
  .inp { border:1.5px solid var(--border); border-radius:9px; padding:9px 11px; font-size:13px; outline:none; width:100%; background:var(--bg2); color:var(--text); }
  .chip-row { display:flex; gap:4px; flex-wrap:wrap; }
  .chip { border:1px solid var(--border); border-radius:20px; padding:4px 10px; font-size:11px; background:var(--bg2); color:var(--text2); }
  .chip.active { border:none; color:#fff; font-weight:700; }
  .check-row { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--text2); cursor:pointer; }
  .time-row { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .duration-row { display:flex; align-items:center; gap:4px; font-size:11px; color:var(--text2); }
  .dur-inp { border:1.5px solid var(--border); border-radius:7px; padding:4px 6px; font-size:11px; width:55px; background:var(--bg2); color:var(--text); outline:none; }
  .lunar-notice { margin-top:4px; font-size:10px; color:#92400E; background:#FFFBEB; border:1px solid #FCD34D; border-radius:6px; padding:5px 8px; }
  .memo-inp { border:1.5px solid var(--border); border-radius:9px; padding:7px 10px; font-size:12px; outline:none; width:100%; resize:vertical; background:var(--bg2); color:var(--text); line-height:1.6; }
  .btn-row { display:flex; gap:5px; margin-top:2px; }
  .btn-del { flex:1; border:1.5px solid #FFE5E5; background:#FFF5F5; color:#FF4B4B; border-radius:8px; padding:8px 0; font-size:12px; font-weight:600; }
  .btn-copy { flex:1; border:1.5px solid var(--border); background:var(--bg2); color:var(--text2); border-radius:8px; padding:8px 0; font-size:12px; font-weight:600; }
  .btn-cancel { flex:1; border:1.5px solid var(--border); background:var(--bg2); color:var(--text2); border-radius:8px; padding:8px 0; font-size:12px; font-weight:600; }
  .btn-save { flex:2; border:none; background:linear-gradient(135deg,var(--green),var(--green2)); color:#fff; border-radius:8px; padding:8px 0; font-size:13px; font-weight:700; }

  /* Todo */
  .todo-list { max-height:140px; overflow:auto; }
  .todo-item { display:flex; align-items:center; gap:5px; padding:4px 0; border-bottom:1px solid var(--border); }
  .todo-item span { font-size:11px; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .todo-del { background:none; border:none; font-size:12px; color:var(--text3); flex-shrink:0; }
  .todo-add { border:1.5px solid var(--border); border-radius:8px; padding:5px 8px; font-size:11px; outline:none; width:100%; margin-top:5px; background:var(--bg2); color:var(--text); }

  /* Tracker */
  .tracker-row { display:flex; align-items:center; gap:5px; margin-bottom:3px; }
  .tracker-day { font-size:9px; color:var(--text3); width:16px; }
  .tracker-bar-bg { flex:1; height:5px; background:var(--bg3); border-radius:3px; overflow:hidden; }
  .tracker-bar { height:100%; background:var(--blue); border-radius:3px; }
  .tracker-mins { font-size:9px; color:var(--text3); width:28px; text-align:right; }
  .tracker-total { font-size:10px; color:var(--green); font-weight:700; margin-top:4px; }

  /* Toast */
  #toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); border-radius:9px; padding:9px 18px; font-size:13px; font-weight:600; box-shadow:0 4px 20px rgba(0,0,0,.2); z-index:400; white-space:nowrap; display:none; color:#fff; }

  /* Install banner */
  #install-banner { position:fixed; bottom:0; left:0; right:0; background:var(--green); color:#fff; padding:12px 16px; display:none; align-items:center; gap:10px; z-index:300; }
  #install-banner span { flex:1; font-size:13px; font-weight:600; }
  #install-banner button { background:#fff; color:var(--green); border:none; border-radius:8px; padding:7px 14px; font-size:12px; font-weight:700; }
  #install-banner .ib-close { background:none; color:#fff; padding:4px; font-size:16px; }
</style>
</head>
<body>

<div id="app">
  <!-- SIDEBAR -->
  <div id="sidebar">
    <button class="add-btn" onclick="openAdd()">＋ 일정 추가</button>
    <div class="tool-grid">
      <button class="tool-btn" id="btn-search" onclick="togglePanel('search')"><span class="ic">🔍</span>검색</button>
      <button class="tool-btn" id="btn-todo"   onclick="togglePanel('todo')"><span class="ic">✅</span>할일</button>
      <button class="tool-btn" id="btn-tracker" onclick="togglePanel('tracker')"><span class="ic">⏱️</span>트래커</button>
      <button class="tool-btn" onclick="exportICS()"><span class="ic">📤</span>내보내기</button>
      <button class="tool-btn" onclick="document.getElementById('ics-file').click()"><span class="ic">📥</span>가져오기</button>
      <button class="tool-btn" id="btn-dark" onclick="toggleDark()"><span class="ic">🌙</span>다크</button>
      <input type="file" id="ics-file" accept=".ics" style="display:none" onchange="importICS(event)">
    </div>

    <div id="notif-bar" class="notif-bar" onclick="requestNotif()" style="display:none">🔔 알림 권한 허용하기</div>

    <!-- 검색 패널 -->
    <div id="panel-search" class="panel" style="display:none">
      <div class="panel-title">🔍 검색</div>
      <input id="search-inp" class="inp" style="padding:7px 10px;font-size:11px" placeholder="제목·메모 검색..." oninput="renderSearch()">
      <div id="search-results" style="max-height:140px;overflow:auto;margin-top:4px"></div>
    </div>

    <!-- 할일 패널 -->
    <div id="panel-todo" class="panel" style="display:none">
      <div class="panel-title">✅ 할 일</div>
      <div id="todo-list" class="todo-list"></div>
      <input class="todo-add" placeholder="새 할 일 입력 후 Enter" onkeydown="addTodo(event)">
    </div>

    <!-- 트래커 패널 -->
    <div id="panel-tracker" class="panel" style="display:none">
      <div class="panel-title">⏱️ 주간 일정 시간</div>
      <div id="tracker-rows"></div>
      <div id="tracker-total" class="tracker-total"></div>
    </div>

    <!-- 알림권한 -->
    <div class="mini-nav">
      <button onclick="navMini(-1)">‹</button>
      <span id="mini-title"></span>
      <button onclick="navMini(1)">›</button>
    </div>
    <div class="mini-grid" id="mini-grid"></div>

    <div class="view-btns">
      <button class="view-btn" id="vb-month" onclick="setView('month')">월</button>
      <button class="view-btn" id="vb-week"  onclick="setView('week')">주</button>
      <button class="view-btn" id="vb-day"   onclick="setView('day')">일</button>
    </div>

    <div class="cat-legend">
      <div class="cat-legend-title">카테고리</div>
      <div class="cat-dots" id="cat-dots"></div>
    </div>

    <div class="upcoming" id="upcoming">
      <div class="upcoming-title">다가오는 일정</div>
      <div id="upcoming-list"></div>
    </div>
  </div>

  <!-- MAIN -->
  <div id="main">
    <div id="header">
      <button class="menu-btn" onclick="toggleSidebar()">☰</button>
      <button class="nav-btn" onclick="nav(-1)">‹</button>
      <button class="nav-btn" onclick="nav(1)">›</button>
      <span id="title"></span>
      <button class="today-btn" onclick="goToday()">오늘</button>
    </div>
    <div id="cal-body"></div>
  </div>
</div>

<!-- Sidebar overlay (mobile) -->
<div id="overlay" onclick="closeSidebar()"></div>

<!-- Modal -->
<div class="modal-bg" id="modal-bg" style="display:none" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-hdr">
      <div>
        <div class="modal-title" id="modal-title">새 일정</div>
        <div class="modal-sub" id="modal-sub"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <input class="inp" id="f-title" placeholder="일정 제목" onkeydown="if(event.key==='Enter')saveEvent()">

      <div>
        <div class="field-label">🏷️ 카테고리</div>
        <div class="chip-row" id="cat-chips"></div>
      </div>

      <div class="time-row">
        <label class="check-row">
          <input type="checkbox" id="f-allday" checked onchange="toggleAllDay()" style="accent-color:var(--green)">종일
        </label>
        <input type="time" id="f-time" class="inp" style="width:auto;padding:5px 8px;font-size:12px;display:none" value="09:00">
        <div class="duration-row" id="dur-row" style="display:none">
          ⏱ <input type="number" id="f-dur" class="dur-inp" value="60" min="5" max="480" step="15"> 분
        </div>
      </div>

      <label class="check-row">
        <input type="checkbox" id="f-todo" style="accent-color:#22C55E">할 일(ToDo)로 등록
      </label>

      <div>

function solarToLunar(y,m,d){
  const a=Math.floor((14-m)/12),yy=y+4800-a,mm=m+12*a-3;
  let jdn=d+Math.floor((153*mm+2)/5)+365*yy+Math.floor(yy/4)-Math.floor(yy/100)+Math.floor(yy/400)-32045;
  const k=Math.floor((jdn-2415021.076998695)/29.53058135+0.5);
  let jm=2415021.076998695+29.53058135*k;
  const T=(jm-2451545)/36525;
  const Mp=(134.9634+477198.8676*T+0.008997*T*T)*(Math.PI/180);
  jm+=0.1117*Math.sin(Mp)+0.0017*Math.sin(2*Mp);
  let ld=Math.round(jdn-Math.floor(jm)+1);
  const lm=((k%12)+12)%12+1;
  if(ld<1)ld+=29;else if(ld>30)ld-=29;
  return{month:lm,day:ld};
}
function lunarStr(date){
  try{const l=solarToLunar(date.getFullYear(),date.getMonth()+1,date.getDate());return`음 ${l.month}/${l.day}`;}catch{return"";}
}

// ════════════════════════════════════════════════════════
// 반복 전개

function expandEvent(ev,rs,re){
  const res=[],base=new Date(ev.date);
  if(!ev.repeat||ev.repeat==="none"){if(base>=rs&&base<=re)res.push({...ev,_v:false});return res;}
  let cur=new Date(base),s=0;
  while(cur<=re&&s++<3000){
    if(cur>=rs)res.push({...ev,date:new Date(cur),_v:!sameDay(cur,base),_bid:ev.id});
    if(ev.repeat==="daily")cur.setDate(cur.getDate()+1);
    else if(ev.repeat==="weekly")cur.setDate(cur.getDate()+7);
    else if(ev.repeat==="monthly")cur.setMonth(cur.getMonth()+1);
    else cur.setFullYear(cur.getFullYear()+1);
  }
  return res;
}
function expandedFor(date){
  const rs=new Date(date);rs.setHours(0,0,0,0);
  const re=new Date(date);re.setHours(23,59,59,999);
  return window._events.flatMap(ev=>expandEvent(ev,rs,re)).filter(e=>sameDay(e.date,date))
    .sort((a,b)=>{if(a.allDay&&!b.allDay)return-1;if(!a.allDay&&b.allDay)return 1;return(a.time||"").localeCompare(b.time||"");});
}

function scheduleNotif(ev){
  if(!ev.alarm||ev.alarm==="none"||ev.allDay)return;
  if(!("Notification"in window)||Notification.permission!=="granted")return;
  const[hh,mm]=(ev.time||"09:00").split(":").map(Number);
  const d=new Date(ev.date);d.setHours(hh,mm,0,0);
  const delay=d.getTime()-parseInt(ev.alarm)*60000-Date.now();
  if(delay<0)return;
  setTimeout(()=>new Notification(`📅 ${ev.title}`,{body:ev.alarm==="0"?"지금 일정입니다!":` ${ev.alarm}분 후 일정`}),delay);
}
async function requestNotif(){
  if(!("Notification"in window))return showToast("알림 미지원","err");
  const p=await Notification.requestPermission();state.notifPerm=p;
  showToast(p==="granted"?"✅ 알림 허용됨!":"알림 거부됨",p==="granted"?"ok":"err");
  renderSidebar();
}

// ICS

function exportICS(){
  const fmt=d=>`${new Date(d).getFullYear()}${p(new Date(d).getMonth()+1)}${p(new Date(d).getDate())}`;
  const lines=["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//MyCalendar//KR"];
  window._events.forEach(ev=>{
    lines.push("BEGIN:VEVENT",`UID:${ev.id}@mc`,`SUMMARY:${ev.title}`);
    if(ev.allDay){lines.push(`DTSTART;VALUE=DATE:${fmt(ev.date)}`,`DTEND;VALUE=DATE:${fmt(ev.date)}`);}
    else{const[hh,mm]=(ev.time||"09:00").split(":").map(Number);lines.push(`DTSTART:${fmt(ev.date)}T${p(hh)}${p(mm)}00`,`DTEND:${fmt(ev.date)}T${p(hh)}${p(mm)}00`);}
    if(ev.memo)lines.push(`DESCRIPTION:${ev.memo}`);
    lines.push("END:VEVENT");
  });
  lines.push("END:VCALENDAR");
  const a=document.createElement("a");a.href="data:text/calendar;charset=utf-8,"+encodeURIComponent(lines.join("\r\n"));a.download="calendar.ics";a.click();
  showToast("ICS 다운로드 완료! 📤");
}
function importICS(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();reader.onload=ev=>{
    const blocks=ev.target.result.split("BEGIN:VEVENT").slice(1);
    const imported=blocks.map(b=>{
      const get=k=>{const m=b.match(new RegExp(`${k}[^:]*:([^\r\n]+)`));return m?m[1].trim():"";};
      const title=get("SUMMARY"),dtstart=get("DTSTART");if(!title||!dtstart)return null;
      const allDay=dtstart.length===8;
      const date=new Date(+dtstart.slice(0,4),+dtstart.slice(4,6)-1,+dtstart.slice(6,8));
      const time=allDay?undefined:`${dtstart.slice(9,11)}:${dtstart.slice(11,13)}`;
      return{id:genId(),title,date,allDay,time,catId:"personal",repeat:"none",alarm:"none",memo:get("DESCRIPTION"),todo:false,duration:60};
    }).filter(Boolean);
    window._events=[...window._events,...imported];saveData();showToast(`${imported.length}개 가져옴! 📥`);render();
  };reader.readAsText(file);e.target.value="";
}

function renderModal(title,isEdit){

  // repeat chips
  const rc=document.getElementById("repeat-chips");rc.innerHTML="";

  else ln.style.display="none";

      btn.className="chip"+(formState.alarm===o.v?" active":"");
      if(formState.alarm===o.v)btn.style.background="#3B82F6";
      btn.textContent=o.l;
      btn.onclick=()=>{formState.alarm=o.v;renderModal(title,isEdit);};
      row.appendChild(btn);

  // buttons
  const br=document.getElementById("btn-row");br.innerHTML="";

function toggleAllDay(){
  const allDay=document.getElementById("f-allday").checked;
  document.getElementById("f-time").style.display=allDay?"none":"block";
  document.getElementById("dur-row").style.display=allDay?"none":"flex";
}

function saveEvent(){
  const title=document.getElementById("f-title").value.trim();if(!title)return;
  const allDay=document.getElementById("f-allday").checked;
  const ev={
    id:editId||genId(),title,
    date:editId?new Date(window._events.find(e=>e.id===editId).date):new Date(state.selDate),
    catId:formState.catId,allDay,
    time:allDay?undefined:document.getElementById("f-time").value,
    duration:parseInt(document.getElementById("f-dur").value)||60,
    repeat:formState.repeat,alarm:formState.alarm,
    memo:document.getElementById("f-memo").value,
    todo:document.getElementById("f-todo").checked,done:false,
  };
  if(editId)window._events=window._events.map(e=>e.id===editId?ev:e);
  else window._events=[...window._events,ev];
  scheduleNotif(ev);saveData();showToast(editId?"수정 완료 ✓":"일정 추가됨 ✓");closeModal();render();
}
function deleteEvent(id){window._events=window._events.filter(e=>e.id!==id);saveData();showToast("삭제됨","warn");closeModal();render();}
function copyEvent(id){
  const ev=window._events.find(e=>e.id===id);if(!ev)return;
  const d=new Date(ev.date);d.setDate(d.getDate()+1);
  window._events=[...window._events,{...ev,id:genId(),date:d}];
  saveData();showToast("다음날로 복사됨 📋");closeModal();render();
}

// ════════════════════════════════════════════════════════
// 할 일
// ════════════════════════════════════════════════════════
function addTodo(e){
  if(e.key!=="Enter")return;
  const val=e.target.value.trim();if(!val)return;
  window._todos=[...window._todos,{id:genId(),title:val,done:false,catId:"personal"}];
  e.target.value="";saveData();renderTodo();
}
function toggleTodo(id){window._todos=window._todos.map(t=>t.id===id?{...t,done:!t.done}:t);saveData();renderTodo();}
function deleteTodo(id){window._todos=window._todos.filter(t=>t.id!==id);saveData();renderTodo();}
function renderTodo(){
  const list=document.getElementById("todo-list");if(!list)return;
  list.innerHTML="";
  window._todos.forEach(t=>{
    const div=document.createElement("div");div.className="todo-item";
    div.innerHTML=`<input type="checkbox" ${t.done?"checked":""} style="accent-color:${catColor(t.catId)};cursor:pointer" onchange="toggleTodo('${t.id}')">
      <span style="text-decoration:${t.done?"line-through":"none"};opacity:${t.done?.5:1};color:var(--text)">${t.title}</span>
      <button class="todo-del" onclick="deleteTodo('${t.id}')">×</button>`;
    list.appendChild(div);
  });
}

// ════════════════════════════════════════════════════════
// 트래커
// ════════════════════════════════════════════════════════
function renderTracker(){
  const el=document.getElementById("tracker-rows");if(!el)return;
  const wds=getWeekDays(state.curDate);let total=0;
  el.innerHTML="";
  wds.forEach(d=>{
    const mins=expandedFor(d).filter(e=>!e.allDay&&!e.todo).reduce((s,e)=>s+(e.duration||60),0);
    total+=mins;
    const row=document.createElement("div");row.className="tracker-row";
    row.innerHTML=`<span class="tracker-day" style="color:${d.getDay()===0?"#FF4B4B":d.getDay()===6?"#3B82F6":"var(--text3)"}">${DAYS_KR[d.getDay()]}</span>
      <div class="tracker-bar-bg"><div class="tracker-bar" style="width:${Math.min(100,mins/4.8)}%"></div></div>
      <span class="tracker-mins">${mins}분</span>`;
    el.appendChild(row);
  });
  document.getElementById("tracker-total").textContent=`합계 ${total}분 (${(total/60).toFixed(1)}h)`;
}

// ════════════════════════════════════════════════════════
// 검색
// ════════════════════════════════════════════════════════
function renderSearch(){
  const q=document.getElementById("search-inp")?.value.trim();
  const el=document.getElementById("search-results");if(!el)return;
  if(!q){el.innerHTML="";return;}
  const res=window._events.filter(e=>e.title.includes(q)||(e.memo||"").includes(q)).sort((a,b)=>new Date(a.date)-new Date(b.date));
  if(!res.length){el.innerHTML=`<div style="font-size:11px;color:var(--text3);padding:5px 0">결과 없음</div>`;return;}
  el.innerHTML="";

    const div=document.createElement("div");
    div.style.cssText="display:flex;gap:6px;padding:5px 2px;cursor:pointer;border-bottom:1px solid var(--border);align-items:center";
    div.innerHTML=`<div style="width:7px;height:7px;border-radius:50%;background:${catColor(ev.catId)};flex-shrink:0"></div>
      <div style="flex:1;min-width:0"><div style="font-size:11px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${ev.title}</div>
      <div style="font-size:9px;color:var(--text3)">${MONTHS_KR[new Date(ev.date).getMonth()]} ${new Date(ev.date).getDate()}일</div></div>`;

}

// ════════════════════════════════════════════════════════
// 그리드 헬퍼
// ════════════════════════════════════════════════════════
function getMonthDays(curDate){
  const y=curDate.getFullYear(),m=curDate.getMonth(),first=new Date(y,m,1).getDay(),dim=new Date(y,m+1,0).getDate(),dipm=new Date(y,m,0).getDate();
  const days=[];
  for(let i=first-1;i>=0;i--)days.push({date:new Date(y,m-1,dipm-i),out:true});
  for(let i=1;i<=dim;i++)days.push({date:new Date(y,m,i),out:false});
  while(days.length<42)days.push({date:new Date(y,m+1,days.length-first-dim+1),out:true});
  return days;
}
function getWeekDays(curDate){
  const d=new Date(curDate);d.setDate(d.getDate()-d.getDay());
  return Array.from({length:7},(_,i)=>{const n=new Date(d);n.setDate(n.getDate()+i);return n;});
}
function getMiniDays(){
  const curDate=state.miniDate;
  const y=curDate.getFullYear(),m=curDate.getMonth(),first=new Date(y,m,1).getDay(),dim=new Date(y,m+1,0).getDate(),dipm=new Date(y,m,0).getDate();
  const days=[];
  for(let i=first-1;i>=0;i--)days.push({date:new Date(y,m-1,dipm-i),out:true});
  for(let i=1;i<=dim;i++)days.push({date:new Date(y,m,i),out:false});
  while(days.length<35)days.push({date:new Date(y,m+1,days.length-first-dim+1),out:true});
  return days;
}

// ════════════════════════════════════════════════════════
// 렌더 - 사이드바
// ════════════════════════════════════════════════════════
function renderSidebar(){
  // notif bar
  document.getElementById("notif-bar").style.display=(state.notifPerm!=="granted")?"block":"none";
  // panels
  ["search","todo","tracker"].forEach(n=>{
    document.getElementById(`panel-${n}`).style.display=state.openPanel===n?"block":"none";
    document.getElementById(`btn-${n}`).classList.toggle("active",state.openPanel===n);
  });
  if(state.openPanel==="todo")renderTodo();
  if(state.openPanel==="tracker")renderTracker();

  // mini cal
  renderMini();

  // view btns
  ["month","week","day"].forEach(v=>{
    document.getElementById(`vb-${v}`).classList.toggle("active",state.view===v);
  });

  // cat dots
  const cd=document.getElementById("cat-dots");cd.innerHTML="";
  CATS.forEach(c=>{
    cd.innerHTML+=`<div class="cat-dot"><div class="dot" style="background:${c.color}"></div>${c.label}</div>`;
  });

  // upcoming
  const re30=new Date(today);re30.setDate(re30.getDate()+30);
  const up=window._events.flatMap(ev=>expandEvent(ev,today,re30)).filter(e=>e.date>=today).sort((a,b)=>a.date-b.date).slice(0,5);
  const ul=document.getElementById("upcoming-list");ul.innerHTML="";
  up.forEach(e=>{
    const realId=e._bid||e.id;
    ul.innerHTML+=`<div class="up-item" onclick="openEdit('${realId}')">
      <div class="dot" style="background:${catColor(e.catId)}"></div>
      <div style="flex:1;min-width:0">
        <div class="up-name">${e.title}</div>
        <div class="up-sub">${MONTHS_KR[new Date(e.date).getMonth()]} ${new Date(e.date).getDate()}일 ${e.allDay?"종일":e.time||""}${e.repeat&&e.repeat!=="none"?" 🔁":""}</div>
      </div>
    </div>`;
  });

  // dark btn label
  const db=document.getElementById("btn-dark");
  db.innerHTML=`<span class="ic">${state.dark?"☀️":"🌙"}</span>${state.dark?"라이트":"다크"}`;
}

function renderMini(){
  const md=state.miniDate;
  document.getElementById("mini-title").textContent=`${md.getFullYear()}. ${p(md.getMonth()+1)}`;
  const grid=document.getElementById("mini-grid");grid.innerHTML="";
  DAYS_KR.forEach((d,i)=>{
    const cell=document.createElement("div");cell.className="mini-cell";
    cell.style.cssText=`font-size:9px;text-align:center;padding:1px;color:${i===0?"#FF4B4B":i===6?"#3B82F6":"var(--text3)"};font-weight:600`;
    cell.textContent=d;grid.appendChild(cell);
  });

    cell.textContent=d.date.getDate();
    cell.onclick=()=>{state.selDate=new Date(d.date);state.curDate=new Date(d.date.getFullYear(),d.date.getMonth(),1);state.miniDate=new Date(d.date.getFullYear(),d.date.getMonth(),1);render();};

}

// ════════════════════════════════════════════════════════
// 렌더 - 헤더
// ════════════════════════════════════════════════════════
function renderHeader(){
  const v=state.view,cd=state.curDate;
  let title="";
  if(v==="month")title=`${cd.getFullYear()}년 ${MONTHS_KR[cd.getMonth()]}`;
  else if(v==="week"){const w=getWeekDays(cd);title=`${w[0].getFullYear()}년 ${MONTHS_KR[w[0].getMonth()]} ${w[0].getDate()}–${w[6].getDate()}일`;}
  else title=`${cd.getFullYear()}년 ${MONTHS_KR[cd.getMonth()]} ${cd.getDate()}일 (${DAYS_KR[cd.getDay()]})`;
  document.getElementById("title").textContent=title;
}

// ════════════════════════════════════════════════════════
// 렌더 - 달력 본문
// ════════════════════════════════════════════════════════
function renderCalBody(){
  const body=document.getElementById("cal-body");body.innerHTML="";
  const dark=state.dark;
  if(state.view==="month") renderMonth(body,dark);
  else if(state.view==="week") renderWeek(body,dark);
  else renderDay(body,dark);
}

function pill(catId,text,extra=""){
  return`<div class="ev-pill" style="background:${catColor(catId)}" ${extra}>${text}</div>`;
}

function renderMonth(body,dark){
  const cd=state.curDate;
  const hdrs=document.createElement("div");hdrs.className="day-headers";
  DAYS_KR.forEach((d,i)=>{hdrs.innerHTML+=`<div class="day-hdr ${i===0?"sun":i===6?"sat":""}">${d}</div>`;});
  body.appendChild(hdrs);

  const rows=document.createElement("div");rows.className="month-rows";
  const monthDays=getMonthDays(cd);
  const yr=cd.getFullYear();
  if(!holidays[yr])holidays[yr]=getHolidays(yr);
  const hols=holidays[yr]||{};

  for(let row=0;row<6;row++){
    const rowDiv=document.createElement("div");rowDiv.className="month-row";
    for(let col=0;col<7;col++){
      const{date,out}=monthDays[row*7+col];
      const isT=sameDay(date,today),hol=hols[hKey(date)],wk=weatherData[dKey(date)];
      const evs=expandedFor(date);
      const ds=dKey(date);
      const cell=document.createElement("div");
      cell.className=`cell${out?" out":""}${isT?" today-cell":""}`;
      cell.ondragover=e=>e.preventDefault();
      cell.ondrop=e=>onDrop(e,ds);
      cell.onclick=()=>{state.selDate=new Date(date);openAdd(ds);};

      const dow=date.getDay();
      let numCls="date-num";
      if(isT)numCls+=" today-num";
      else if(hol)numCls+=" hol";
      else if(out)numCls+=" out-num";
      else if(dow===0)numCls+=" sun-num";
      else if(dow===6)numCls+=" sat-num";

      let html=`<div class="cell-top">
        <span class="${numCls}">${date.getDate()}</span>
        <div class="cell-meta">${wk?`<span class="weather-ic" title="${wk.temp}°C">${wk.icon}</span>`:""}
        <span class="lunar">${lunarStr(date)}</span></div></div>`;
      if(hol)html+=`<div class="hol-name">${hol}</div>`;
      evs.slice(0,2).forEach(ev=>{
        const realId=ev._bid||ev.id;
        html+=`<div class="ev-pill" style="background:${catColor(ev.catId)}" draggable="true"
          ondragstart="event.stopPropagation();onDragStart(event,'${realId}')"
          onclick="event.stopPropagation();openEdit('${realId}')">
          ${ev.todo?"☑ ":""}${ev.repeat&&ev.repeat!=="none"?"🔁":""}${!ev.allDay&&ev.time?ev.time+" ":""}${ev.title}</div>`;
      });
      if(evs.length>2)html+=`<div class="more">+${evs.length-2}개</div>`;
      cell.innerHTML=html;rowDiv.appendChild(cell);
    }
    rows.appendChild(rowDiv);
  }
  body.appendChild(rows);
  body.style.display="flex";body.style.flexDirection="column";
}

function renderWeek(body,dark){
  const wds=getWeekDays(state.curDate);
  const yr=wds[0].getFullYear();
  if(!holidays[yr])holidays[yr]=getHolidays(yr);
  const hols=holidays[yr]||{};

  // header
  const hdr=document.createElement("div");hdr.className="week-hdr-row";
  hdr.innerHTML=`<div class="time-gutter"></div>`;
  wds.forEach((d,i)=>{
    const isT=sameDay(d,today),wk=weatherData[dKey(d)];
    hdr.innerHTML+=`<div class="week-day-col${isT?" today-col":""}">
      <div class="week-day-name" style="color:${i===0?"#FF4B4B":i===6?"#3B82F6":"var(--text3)"}">${DAYS_KR[d.getDay()]}${wk?" "+wk.icon:""}</div>
      <span class="week-day-num${isT?" today-num":""}" style="color:${isT?"#fff":i===0?"#FF4B4B":i===6?"#3B82F6":"var(--text)"}">${d.getDate()}</span>
      <div class="week-day-lunar">${lunarStr(d)}</div></div>`;
  });
  body.appendChild(hdr);

  // allday row
  const ar=document.createElement("div");ar.className="allday-row";
  ar.innerHTML=`<div class="allday-label">종일</div>`;
  wds.forEach(d=>{
    const col=document.createElement("div");col.className="allday-col";
    expandedFor(d).filter(e=>e.allDay).forEach(ev=>{
      const realId=ev._bid||ev.id;
      col.innerHTML+=`<div class="ev-pill" style="background:${catColor(ev.catId)};font-size:9px;margin-top:1px" onclick="openEdit('${realId}')">${ev.title}</div>`;
    });
    ar.appendChild(col);
  });
  body.appendChild(ar);

  // time scroll
  const ts=document.createElement("div");ts.className="time-scroll";
  const tc=document.createElement("div");tc.className="time-col";
  tc.innerHTML=`<div style="height:8px"></div>`;
  for(let h=0;h<24;h++)tc.innerHTML+=`<div class="time-label">${h>0?h+"시":""}</div>`;
  ts.appendChild(tc);

  wds.forEach((d,i)=>{
    const col=document.createElement("div");col.className="week-ev-col";
    col.onclick=()=>{state.selDate=new Date(d);openAdd(dKey(d));};
    for(let h=0;h<24;h++){col.innerHTML+=`<div class="hour-line ${dark?"dark-line":"light-line"}"></div>`;}
    expandedFor(d).filter(e=>!e.allDay).forEach(ev=>{
      const[hh,mm]=(ev.time||"09:00").split(":").map(Number);
      const top=8+hh*52+mm*(52/60);
      const realId=ev._bid||ev.id;
      col.innerHTML+=`<div class="timed-ev" style="top:${top}px;background:${catColor(ev.catId)}" draggable="true"
        ondragstart="event.stopPropagation();onDragStart(event,'${realId}')"
        onclick="event.stopPropagation();openEdit('${realId}')">${ev.time} ${ev.title}</div>`;
    });
    ts.appendChild(col);
  });
  body.appendChild(ts);
  body.style.display="flex";body.style.flexDirection="column";
}

function renderDay(body,dark){
  const cd=state.curDate;
  const yr=cd.getFullYear();
  if(!holidays[yr])holidays[yr]=getHolidays(yr);
  const hols=holidays[yr]||{};
  const hol=hols[hKey(cd)];
  const wk=weatherData[dKey(cd)];

  const hdr=document.createElement("div");hdr.className="day-hdr-bar";
  hdr.innerHTML=`<span style="font-size:13px;font-weight:700">${DAYS_KR[cd.getDay()]}요일</span>
    <span style="font-size:10px;color:var(--text3)">${lunarStr(cd)}</span>
    ${wk?`<span style="font-size:11px">${wk.icon} ${wk.temp}°C</span>`:""}
    ${hol?`<span style="font-size:11px;color:#FF4B4B;font-weight:600">${hol}</span>`:""}`;
  expandedFor(cd).filter(e=>e.allDay).forEach(ev=>{
    const realId=ev._bid||ev.id;
    hdr.innerHTML+=`<div class="ev-pill" style="background:${catColor(ev.catId)};cursor:pointer" onclick="openEdit('${realId}')">${ev.title}</div>`;
  });
  body.appendChild(hdr);

  const scroll=document.createElement("div");scroll.style.cssText="flex:1;overflow:auto;display:flex";
  const tc=document.createElement("div");tc.className="time-col";
  tc.innerHTML=`<div style="height:8px"></div>`;
  for(let h=0;h<24;h++)tc.innerHTML+=`<div class="time-label">${h>0?h+"시":""}</div>`;
  scroll.appendChild(tc);

  const col=document.createElement("div");col.className="day-ev-col";col.onclick=()=>openAdd(dKey(cd));
  for(let h=0;h<24;h++)col.innerHTML+=`<div style="height:52px;border-bottom:1px solid ${dark?"#2D3748":"#F0F0F0"}"></div>`;
  expandedFor(cd).filter(e=>!e.allDay).forEach(ev=>{
    const[hh,mm]=(ev.time||"09:00").split(":").map(Number);
    const top=8+hh*52+mm*(52/60);
    const h=Math.max(24,(ev.duration||60)/60*52);
    const realId=ev._bid||ev.id;
    col.innerHTML+=`<div class="day-timed-ev" style="top:${top}px;height:${h}px;background:${catColor(ev.catId)}" onclick="event.stopPropagation();openEdit('${realId}')">
      <div>${ev.time} ${ev.title}${ev.memo?" 📝":""}</div>
      ${ev.duration?`<div style="font-size:9px;opacity:.7">${ev.duration}분</div>`:""}</div>`;
  });
  scroll.appendChild(col);
  body.appendChild(scroll);
  body.style.display="flex";body.style.flexDirection="column";
}

// ════════════════════════════════════════════════════════
// 메인 렌더
// ════════════════════════════════════════════════════════
function render(){
  renderHeader();
  renderCalBody();
  renderSidebar();
}

// PWA: Install prompt
// ════════════════════════════════════════════════════════
window.addEventListener("beforeinstallprompt",e=>{
  e.preventDefault();deferredPrompt=e;
  document.getElementById("install-banner").style.display="flex";
});
function installApp(){
  if(!deferredPrompt)return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(()=>{deferredPrompt=null;document.getElementById("install-banner").style.display="none";});
}
window.addEventListener("appinstalled",()=>{
  document.getElementById("install-banner").style.display="none";
  showToast("🎉 앱 설치 완료!");
});

// ════════════════════════════════════════════════════════
// Service Worker (오프라인 캐싱)
// ════════════════════════════════════════════════════════
if("serviceWorker" in navigator){
  const swCode=`
    const CACHE='cal-v1';
    self.addEventListener('install',e=>e.waitUntil(caches.open(CACHE).then(c=>c.addAll(['.']))));
    self.addEventListener('fetch',e=>{
      if(e.request.url.includes('open-meteo')){e.respondWith(fetch(e.request).catch(()=>new Response('')));return;}
      e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{
        const clone=res.clone();caches.open(CACHE).then(c=>c.put(e.request,clone));return res;
      }).catch(()=>caches.match('.'))));
    });
  `;
  const swBlob=new Blob([swCode],{type:"application/javascript"});
  const swURL=URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swURL).catch(()=>{});
}

if(state.dark) document.body.classList.add("dark");
if("Notification" in window) state.notifPerm=Notification.permission;
holidays[today.getFullYear()]=getHolidays(today.getFullYear());
loadWeather();
render();
